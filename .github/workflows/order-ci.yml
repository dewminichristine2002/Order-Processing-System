name: Order Service CI/CD

on:
  push:
    paths:
      - 'backend/order-service/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  build-order:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend/order-service

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # ✅ Setup Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      # ✅ Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # ✅ Run tests
      - name: Run Tests
        run: mvn test

      # ✅ Build package
      - name: Build Package
        run: mvn clean package

      # 🔥 SONARCLOUD SCAN (FIXED VERSION)
      - name: SonarCloud Scan
        run: |
          mvn clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dsonar.projectKey=dewminichristine2002_Order-Processing-System \
          -Dsonar.organization=dewminichristine2002 \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # ✅ Docker Login
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Build & Push Docker Image
      - name: Build & Push Order Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/order-service:${{ github.sha }}
          docker tag ${{ secrets.DOCKER_USERNAME }}/order-service:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/order-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/order-service:latest