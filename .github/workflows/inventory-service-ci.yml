name: inventory-service CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - "backend/inventory-service/**"
      - ".github/workflows/inventory-service-ci.yml"
  pull_request:
    paths:
      - "backend/inventory-service/**"
      - ".github/workflows/inventory-service-ci.yml"

permissions:
  contents: read
  packages: write

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Maven wrapper
        working-directory: backend/inventory-service
        run: |
          sed -i 's/\r$//' mvnw
          chmod +x mvnw

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        working-directory: backend/inventory-service
        run: ./mvnw -B clean test

      - name: Build jar
        working-directory: backend/inventory-service
        run: ./mvnw -B -DskipTests package

  docker:
    runs-on: ubuntu-latest
    needs: test-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/inventory-service
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: backend/inventory-service
          file: backend/inventory-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
