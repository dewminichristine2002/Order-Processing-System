name: Inventory Service CI/CD

on:
  push:
    paths:
      - 'backend/inventory-service/**'
    branches:
      - main

jobs:
  build-inventory:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/inventory-service

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Run Tests
      run: mvn test

    - name: Build Package
      run: mvn clean package

    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push Inventory Service
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/inventory-service:${{ github.sha }} .
        docker push ${{ secrets.DOCKER_USERNAME }}/inventory-service:${{ github.sha }}
        docker tag ${{ secrets.DOCKER_USERNAME }}/inventory-service:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/inventory-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/inventory-service:latest