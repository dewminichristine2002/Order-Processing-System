server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/orders/**
        - id: payments-service
          uri: ${PAYMENTS_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/payments/**
        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/inventory/**
        - id: shipping-service
          uri: ${SHIPPING_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/shipping/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
