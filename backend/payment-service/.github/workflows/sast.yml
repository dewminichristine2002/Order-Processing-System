name: SAST – SonarCloud & Snyk

# ─────────────────────────────────────────────────────────────────────────────
# DevSecOps – Static Application Security Testing (SAST)
#
# Tool 1: SonarCloud  – static code analysis (bugs, security hotspots,
#          code smells, coverage). Free for public repositories.
#          Setup: https://sonarcloud.io → Import GitHub repo →
#          copy Project Key & Organization → add as GitHub Actions Variables.
#
# Tool 2: Snyk  – dependency & container vulnerability scanning (SCA + SAST).
#          Free for open-source projects.
#          Setup: https://app.snyk.io → Connect GitHub →
#          Account Settings → copy API token → add as GitHub Secret SNYK_TOKEN.
#
# Required GitHub repository configuration
# ─────────────────────────────────────────
# Variables (Settings → Secrets and Variables → Actions → Variables):
#   SONAR_PROJECT_KEY  – e.g. my-org_payment-service
#   SONAR_ORGANIZATION – e.g. my-org
#
# Secrets (Settings → Secrets and Variables → Actions → Secrets):
#   SONAR_TOKEN  – SonarCloud analysis token
#   SNYK_TOKEN   – Snyk API token
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Weekly Monday 02:00 UTC – catches newly published CVEs even without a push
    - cron: "0 2 * * 1"

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 – SonarCloud SAST
  # ───────────────────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for SonarCloud blame info

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build, run tests with coverage, and analyse with SonarCloud
        # mvn verify   → compiles, runs tests, generates JaCoCo XML report
        # sonar:sonar  → uploads analysis + coverage to SonarCloud
        run: |
          ./mvnw --batch-mode --no-transfer-progress verify sonar:sonar \
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: ""
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
          APP_INTERNAL_API_KEY: test-key-sonar
          APP_ORDER_BASE_URL: http://localhost:8080

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 – Snyk SCA (Software Composition Analysis)
  #         Scans Maven dependencies for known CVEs
  # ───────────────────────────────────────────────────────────────────────────
  snyk-sca:
    name: Snyk – Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run Snyk to check Maven dependencies for vulnerabilities
        uses: snyk/actions/maven@master
        continue-on-error: true   # report findings but do not fail the branch on free tier
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects

      - name: Upload Snyk SCA results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-sca-results
          path: snyk.json
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 – Snyk Container Image Scanning
  # ───────────────────────────────────────────────────────────────────────────
  snyk-container:
    name: Snyk – Container Image Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build JAR (required to build Docker image)
        run: ./mvnw --batch-mode --no-transfer-progress package -DskipTests

      - name: Build Docker image for scanning
        run: docker build -t payment-service:scan-${{ github.sha }} .

      - name: Scan Docker image with Snyk
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: payment-service:scan-${{ github.sha }}
          args: --severity-threshold=high --file=Dockerfile

      - name: Upload Snyk container results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-container-results
          path: snyk.json
          retention-days: 30
