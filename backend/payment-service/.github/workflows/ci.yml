name: CI – Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build and Test (Java 21 / Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build with Maven (skip tests for compile check)
        run: ./mvnw --batch-mode --no-transfer-progress package -DskipTests

      - name: Run unit & integration tests
        env:
          # Provide non-sensitive defaults so the Spring context can start
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: ""
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
          APP_ORDERBASEURL: http://localhost:8080
          APP_INTERNALAPIKEY: test-key
        run: ./mvnw --batch-mode --no-transfer-progress test

      # ── OWASP Dependency Check ─────────────────────────────────────────────
      # Scans all declared dependencies against the NVD CVE database.
      # Uses || true to upload the report even when findings exist.
      - name: OWASP Dependency Check (CVE scan)
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: ""
          APP_INTERNAL_API_KEY: test-key
          APP_ORDER_BASE_URL: http://localhost:8080
        run: |
          ./mvnw --batch-mode --no-transfer-progress \
            org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFile=owasp-suppressions.xml || true

      - name: Upload OWASP Dependency Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.*
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload build artifact (JAR)
        uses: actions/upload-artifact@v4
        with:
          name: payment-service-jar
          path: target/payment-service-*.jar
          retention-days: 7
