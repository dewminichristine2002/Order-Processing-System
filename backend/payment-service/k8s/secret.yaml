# ─────────────────────────────────────────────────────────────────────────────
# SECURITY NOTICE
# ─────────────────────────────────────────────────────────────────────────────
# NEVER store real secret values in this file. This file is tracked in Git.
#
# Provide values via one of these methods:
#   1. GitHub Secrets (CD pipeline substitutes them at deploy time)
#   2. External Secrets Operator (AWS Secrets Manager / Azure Key Vault / Vault)
#   3. kubectl apply manually with real base64 values ONLY in your cluster
#
# To encode a value:  echo -n 'your-value' | base64
# PowerShell:         [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes('your-value'))
#
# GitHub Secrets required for the CD pipeline:
#   DB_URL           – full JDBC URL with sslmode=require
#   DB_USERNAME      – database username
#   DB_PASSWORD      – database password
#   INTERNAL_API_KEY – shared API key for inter-service calls
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: payment-service-secret
  namespace: payment
  labels:
    app: payment-service
type: Opaque
data:
  # Replace each PLACEHOLDER with a real base64-encoded value before applying.
  # In the CD pipeline these are substituted from GitHub Secrets automatically.
  SPRING_DATASOURCE_URL: PLACEHOLDER_BASE64_DB_URL
  SPRING_DATASOURCE_USERNAME: PLACEHOLDER_BASE64_DB_USERNAME
  SPRING_DATASOURCE_PASSWORD: PLACEHOLDER_BASE64_DB_PASSWORD
  APP_INTERNAL_API_KEY: PLACEHOLDER_BASE64_INTERNAL_API_KEY
