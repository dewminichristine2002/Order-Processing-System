apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: payment
  labels:
    app: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      # ── Pod-level security context ────────────────────────────────────────
      # runAsNonRoot: Kubernetes refuses to start the pod if the container
      # image tries to run as UID 0 (root).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000        # matches 'appuser' UID created in Dockerfile
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault   # restrict syscalls to a safe default allowlist

      # Prevent automounting the service-account token (least privilege:
      # the payment-service does not need to call the Kubernetes API)
      automountServiceAccountToken: false

      containers:
        - name: payment-service
          # The CD workflow replaces IMAGE_PLACEHOLDER with the real tag
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: payment-service-config
            - secretRef:
                name: payment-service-secret
          # ── Container-level security context ───────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false   # cannot gain more privileges than parent
            readOnlyRootFilesystem: true       # immutable container filesystem
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL                          # drop all Linux capabilities
          # Writable tmp volume (Spring Boot needs /tmp for temporary files)
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: tmp-volume
          emptyDir: {}
