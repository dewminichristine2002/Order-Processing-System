# ─────────────────────────────────────────────────────────────────────────────
# NetworkPolicy – Least-Privilege Network Access for payment-service
# ─────────────────────────────────────────────────────────────────────────────
# Principle of least privilege:
#   Ingress : only pods labelled app=order-service (in the "order" namespace)
#             may reach port 8082.  No other in-cluster traffic is permitted.
#   Egress  : only outbound to PostgreSQL (5432), DNS (53), and the
#             order-service (8080) are allowed.  All other outbound traffic
#             is blocked, preventing data exfiltration or accidental internet calls.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payment-service-netpol
  namespace: payment
spec:
  podSelector:
    matchLabels:
      app: payment-service

  policyTypes:
    - Ingress
    - Egress

  # ── Allowed inbound traffic ────────────────────────────────────────────────
  ingress:
    # Accept traffic from order-service pods only
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: order
          podSelector:
            matchLabels:
              app: order-service
      ports:
        - protocol: TCP
          port: 8082

    # Accept traffic within the payment namespace (e.g. Prometheus scraping)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: payment
      ports:
        - protocol: TCP
          port: 8082

  # ── Allowed outbound traffic ───────────────────────────────────────────────
  egress:
    # PostgreSQL / Supabase database
    - ports:
        - protocol: TCP
          port: 5432

    # DNS resolution (required for hostname lookups including DB host)
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Order-service callback (update order status after payment is confirmed)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: order
          podSelector:
            matchLabels:
              app: order-service
      ports:
        - protocol: TCP
          port: 8080
