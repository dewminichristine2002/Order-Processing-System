# Test configuration: use in-memory H2 so tests are isolated and repeatable
spring.datasource.url=jdbc:h2:mem:inventory_test_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# Ensure src/main/resources/data.sql is applied for seeded test data
spring.sql.init.mode=always
