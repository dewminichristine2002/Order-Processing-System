spring.application.name=inventory-service
server.port=${PORT:8081}

# =========================
# Supabase PostgreSQL
# =========================
spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_HOST:db.YOUR_PROJECT_REF.supabase.co}:${SUPABASE_DB_PORT:5432}/${SUPABASE_DB_NAME:postgres}?sslmode=require&preferQueryMode=simple&tcpKeepAlive=true&connectTimeout=${SUPABASE_CONNECT_TIMEOUT:15}&socketTimeout=${SUPABASE_SOCKET_TIMEOUT:60}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${INVENTORY_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false

# Optional: only enable SQL init if you really need data.sql on startup
spring.sql.init.mode=${INVENTORY_SQL_INIT_MODE:never}

# Disable H2 console (not applicable for Postgres)
spring.h2.console.enabled=false

# =========================
# Order Service integration
# =========================
inventory.order-service.base-url=${ORDER_SERVICE_BASE_URL:http://localhost:8082}
inventory.order-service.notify-path=${ORDER_SERVICE_NOTIFY_PATH:/orders/stock-updated}
inventory.order-service.notify-enabled=${ORDER_SERVICE_NOTIFY_ENABLED:false}
inventory.order-service.status-update-enabled=${ORDER_SERVICE_STATUS_UPDATE_ENABLED:true}