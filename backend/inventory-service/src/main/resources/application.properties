spring.application.name=inventory-service

# --- Database (default: in-memory H2 for local dev) ---
spring.datasource.url=${INVENTORY_DATASOURCE_URL:jdbc:h2:mem:inventory_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${INVENTORY_DATASOURCE_USERNAME:sa}
spring.datasource.password=${INVENTORY_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${INVENTORY_DATASOURCE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${INVENTORY_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Order Service notification (best-effort) ---
inventory.order-service.base-url=${ORDER_SERVICE_BASE_URL:http://localhost:8080}
inventory.order-service.notify-path=${ORDER_SERVICE_NOTIFY_PATH:/orders/stock-updated}
inventory.order-service.notify-enabled=${ORDER_SERVICE_NOTIFY_ENABLED:false}
