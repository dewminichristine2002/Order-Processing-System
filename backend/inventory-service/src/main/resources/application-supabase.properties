# Supabase Postgres profile
# Activate with: SPRING_PROFILES_ACTIVE=supabase

# Use the JDBC connection details from Supabase Dashboard -> Project Settings -> Database
# Direct connection typically uses port 5432.
# Transaction pooler (PgBouncer) typically uses port 6543.
#
# Note: Supabase may show "Not IPv4 compatible" for direct connection. If your network/app is IPv4-only,
# use the Transaction Pooler (preferred) or purchase the IPv4 add-on.

spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_HOST:db.YOUR_PROJECT_REF.supabase.co}:${SUPABASE_DB_PORT:5432}/${SUPABASE_DB_NAME:postgres}?sslmode=require&preferQueryMode=simple
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# For development you can keep 'update'. For production prefer 'validate' + migrations.
spring.jpa.hibernate.ddl-auto=${INVENTORY_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false

# Don't expose H2 console in this profile
spring.h2.console.enabled=false
